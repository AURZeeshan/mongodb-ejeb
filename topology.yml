---
name: mongodb, mysql & ejabberd attack training

hosts:
  - name: db-server
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.medium

  - name: ejabberd-server              # NEW — hosts ejabberd + MySQL + Apache + phpMyAdmin
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.medium            # needs ≥2 GB RAM for ejabberd + MySQL

  - name: kali
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.medium

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

networks:
  - name: server-switch
    cidr: 192.168.20.0/24
    accessible_by_user: false

  - name: client-switch
    cidr: 192.168.30.0/24
    accessible_by_user: true

  - name: db-switch
    cidr: 192.168.40.0/24
    accessible_by_user: false

net_mappings:
  - host: server
    network: server-switch
    ip: 192.168.20.5

  - host: db-server
    network: db-switch
    ip: 192.168.40.5

  - host: ejabberd-server              # sits on server-switch so kali can reach it via router
    network: server-switch
    ip: 192.168.20.10

  - host: kali
    network: client-switch
    ip: 192.168.30.10

router_mappings:
  - router: router
    network: server-switch
    ip: 192.168.20.1

  - router: router
    network: client-switch
    ip: 192.168.30.1

  - router: router
    network: db-switch
    ip: 192.168.40.1

groups:
  - name: monitor-icmp
    nodes:
      - server
      - db-server
      - ejabberd-server
      - kali
      - router

  - name: monitor-os
    nodes:
      - server
      - db-server
      - ejabberd-server
      - kali
      - router