name: mongoDB-mysql-exercise

hosts:
  - name: server
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.small

  - name: windows-host
    base_box:
      image: Windows-Server-2022
      mgmt_user: windows
      mgmt_protocol: winrm
    flavor: standard.medium

  - name: db-server          # NEW: hosts MySQL + MongoDB
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.medium  # medium — two DB services

  - name: kali               # NEW: attacker machine
    base_box:
      image: kali-linux-x86_64
      mgmt_user: kali
      mgmt_protocol: ssh
    flavor: standard.medium

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

networks:
  - name: server-switch
    cidr: 192.168.20.0/24
    accessible_by_user: false

  - name: client-switch
    cidr: 192.168.30.0/24
    accessible_by_user: true

  - name: db-switch          # NEW: isolated DB network
    cidr: 192.168.40.0/24
    accessible_by_user: false

net_mappings:
  - host: server
    network: server-switch
    ip: 192.168.20.5

  - host: windows-host
    network: client-switch
    ip: 192.168.30.5

  - host: db-server          # NEW
    network: db-switch
    ip: 192.168.40.5

  - host: kali               # NEW — kali sits on client-switch so it can reach all via router
    network: client-switch
    ip: 192.168.30.10

router_mappings:
  - router: router
    network: server-switch
    ip: 192.168.20.1

  - router: router
    network: client-switch
    ip: 192.168.30.1

  - router: router           # NEW
    network: db-switch
    ip: 192.168.40.1

groups: []