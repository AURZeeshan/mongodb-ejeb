name: library-demo-for-windows

hosts:
  - name: server
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.small  # Linux is lightweight

  - name: windows-host
    base_box:
      image: Windows-Server-2022 # make sure this is the pre-built CRCZ Windows image
      mgmt_ur: windows
      mgmt_protocol: winrm
    flavor: standard.medium  # at least 2 CPU / 4GB RAM
    timeout: 600            # 10 minutes for slow boot

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

networks:
  - name: server-switch
    cidr: 192.168.20.0/24
    accessible_by_user: false

  - name: client-switch
    cidr: 192.168.30.0/24

net_mappings:
  - host: server
    network: server-switch
    ip: 192.168.20.5
  - host: windows-host
    network: client-switch
    ip: 192.168.30.5

router_mappings:
  - router: router
    network: server-switch
    ip: 192.168.20.1
  - router: router
    network: client-switch
    ip: 192.168.30.1

groups: []
