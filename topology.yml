---
name: mongodb-mysql-ejabberd-attack-training

hosts:
  - name: db-server
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.medium

  - name: ejabberd-server
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.medium

  - name: kali
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.medium

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

networks:
  - name: server-switch
    cidr: 192.168.20.0/24
    accessible_by_user: false
    router: router
    router_ip: 192.168.20.1

  - name: client-switch
    cidr: 192.168.30.0/24
    accessible_by_user: true
    router: router
    router_ip: 192.168.30.1

  - name: db-switch
    cidr: 192.168.40.0/24
    accessible_by_user: false
    router: router
    router_ip: 192.168.40.1

net_mappings:
  - host: ejabberd-server
    network: server-switch
    ip: 192.168.20.10

  - host: kali
    network: client-switch
    ip: 192.168.30.10

  - host: db-server
    network: db-switch
    ip: 192.168.40.5

groups:
  - name: monitor-icmp
    nodes:
      - ejabberd-server
      - db-server
      - kali
      - router

  - name: monitor-os
    nodes:
      - ejabberd-server
      - db-server
      - kali
      - router