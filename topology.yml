---
name: mongodb-mysql-ejabberd-attack-training

hosts:
  - name: db-server
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.medium

  - name: ejabberd-server
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    flavor: standard.medium

  - name: kali
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.medium

routers:
  - name: router-server
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

  - name: router-client
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

  - name: router-db
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: ssh
    flavor: standard.small

networks:
  - name: server-switch
    cidr: 192.168.20.0/24
    accessible_by_user: false

  - name: client-switch
    cidr: 192.168.30.0/24
    accessible_by_user: true

  - name: db-switch
    cidr: 192.168.40.0/24
    accessible_by_user: false

net_mappings:
  - host: ejabberd-server
    network: server-switch
    ip: 192.168.20.10

  - host: kali
    network: client-switch
    ip: 192.168.30.10

  - host: db-server
    network: db-switch
    ip: 192.168.40.5

router_mappings:
  - router: router-server
    network: server-switch
    ip: 192.168.20.1

  - router: router-client
    network: client-switch
    ip: 192.168.30.1

  - router: router-db
    network: db-switch
    ip: 192.168.40.1

groups:
  - name: monitor-icmp
    nodes:
      - ejabberd-server
      - db-server
      - kali
      - router-server
      - router-client
      - router-db

  - name: monitor-os
    nodes:
      - ejabberd-server
      - db-server
      - kali
      - router-server
      - router-client
      - router-db