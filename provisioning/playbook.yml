---

# ==============================
# Disable QXL (Linux only)
# ==============================

- name: disable qxl
  hosts:
    - routers
    - server
  gather_facts: yes
  become: yes
  tasks:
    - include_role:
        name: disable-qxl
      when: ansible_os_family == 'Debian'


# ==============================
# Linux Server Setup
# ==============================

- name: set up server
  hosts: server
  become: yes
  roles:
    - role: server
      telnet_port: "{{ telnet_port }}"
      flag: "{{ alice_flag }}"
      flag_2: "{{ root_flag }}"


