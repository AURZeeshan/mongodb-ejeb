---

# ==============================
# Disable QXL (Linux only)
# ==============================

- name: disable qxl
  hosts:
    - router-server
    - router-client
    - router-db
    - ejabberd-server
  gather_facts: yes
  become: yes
  tasks:
    - include_role:
        name: disable-qxl
      when: ansible_os_family == 'Debian'



# ==============================
# Ejabberd Server Setup
# ==============================

- name: set up ejabberd server
  hosts: ejabberd-server
  become: yes
  roles:
    - role: ejabberd-server
      ejabberd_server_ip: "192.168.20.10"
      ejabberd_admin_user: "admin"
      ejabberd_admin_password: "Admin@1234"
      mysql_root_password: "R00tP@ss!"
      ejabberd_db_name: "ejabberd"
      ejabberd_db_user: "ejabberd"
      ejabberd_db_password: "SomeActualPassword123"
      ejabberd_flag: "FLAG{ejabberd_xmpp_misconfigured}"




# ==============================
# Linux Hostname Cleanup
# ==============================

- name: remove stack name prefix from hostnames of Linux nodes
  hosts:
    - router-server
    - router-client
    - router-db
    - man
  gather_facts: yes
  become: yes
  tasks:

    - name: Set new hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Make cloud-init preserve hostname changes
      lineinfile:
        path: /etc/cloud/cloud.cfg
        regexp: '^preserve_hostname:'
        line: 'preserve_hostname: true'
        create: yes

    - name: Remove stack name prefix from /etc/hosts
      lineinfile:
        path: /etc/hosts
        regexp: '^\d+\.\d+\.\d+\.\d+\s+{{ stack_prefix }}'
        state: absent
      when: stack_prefix is defined


# ==============================
# DB Server Setup (MySQL + MongoDB)
# ==============================

- name: set up db server
  hosts: db-server
  become: yes
  roles:
    - role: mysql-server
      mysql_root_password: "{{ mysql_root_password }}"
      mysql_user: dbuser
      mysql_user_password: "{{ mysql_user_password }}"
      mysql_db: company
      mysql_flag: "{{ mysql_flag }}"

    - role: mongodb-server
      mongo_user: mongoadmin
      mongo_password: "{{ mongo_password }}"
      mongo_db: records
      mongo_flag: "{{ mongo_flag }}"


# ==============================
# Kali Attacker Setup
# ==============================

- name: set up kali attacker
  hosts: kali
  become: yes
  roles:
    - role: kali-attacker


# ==============================
# Disable QXL on db-server, kali, ejabberd-server
# ==============================

- name: disable qxl on new Linux nodes
  hosts:
    - db-server
    - kali
    - ejabberd-server          # added
  gather_facts: yes
  become: yes
  tasks:
    - include_role:
        name: disable-qxl
      when: ansible_os_family == 'Debian'


# ==============================
# Hostname cleanup for new nodes
# ==============================

- name: remove stack name prefix from new Linux nodes
  hosts:
    - db-server
    - kali
    - ejabberd-server          # added
  gather_facts: yes
  become: yes
  tasks:
    - name: Set new hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Make cloud-init preserve hostname changes
      lineinfile:
        path: /etc/cloud/cloud.cfg
        regexp: '^preserve_hostname:'
        line: 'preserve_hostname: true'
        create: yes

    - name: Remove stack name prefix from /etc/hosts
      lineinfile:
        path: /etc/hosts
        regexp: '^\d+\.\d+\.\d+\.\d+\s+{{ stack_prefix }}'
        state: absent
      when: stack_prefix is defined


# ==============================
# Contestant user on all Linux hosts
# ==============================

- name: create contestant user on all Linux hosts
  hosts:
    - db-server
    - ejabberd-server          # added
    - kali
    - routers
  become: yes
  tasks:
    - name: Create contestant user
      user:
        name: "{{ contestant_user }}"
        password: "{{ contestant_password | password_hash('sha512') }}"
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Enable SSH password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
      notify: restart sshd

  handlers:
    - name: restart sshd
      service:
        name: ssh
        state: restarted
