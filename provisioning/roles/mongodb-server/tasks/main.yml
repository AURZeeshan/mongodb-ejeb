---
- name: Install gnupg and curl (prereqs)
  apt:
    pkg:
      - gnupg
      - curl
    update_cache: yes
    allow_unauthenticated: yes

- name: Add MongoDB GPG key
  apt_key:
    url: https://www.mongodb.org/static/pgp/server-7.0.asc
    state: present

- name: Add MongoDB apt repository
  apt_repository:
    repo: "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse"
    state: present
    filename: mongodb-org-7.0

- name: Install MongoDB
  apt:
    name: mongodb-org
    update_cache: yes

- name: Ensure MongoDB is running
  service:
    name: mongod
    state: started
    enabled: yes

# Intentional misconfiguration: MongoDB listens on 0.0.0.0 with no auth initially
- name: Configure MongoDB to bind on all interfaces (vulnerable — no auth)
  lineinfile:
    path: /etc/mongod.conf
    regexp: '^\s*bindIp:'
    line: '  bindIp: 0.0.0.0'
  notify: restart mongod

- name: Wait for MongoDB to be ready
  wait_for:
    port: 27017
    delay: 5
    timeout: 30

- name: Insert flag document into MongoDB (unauthenticated at this point)
  community.mongodb.mongodb_shell:
    eval: |
      db = db.getSiblingDB('{{ mongo_db }}');
      if (db.flags.countDocuments({name: 'admin'}) === 0) {
        db.flags.insertOne({ name: 'admin', secret: '{{ mongo_flag }}', note: 'confidential' });
      }
  # Alternatively use a shell command if the module is unavailable:
  # command: >
  #   mongosh --quiet --eval
  #   "db=db.getSiblingDB('{{ mongo_db }}');
  #    db.flags.insertOne({name:'admin',secret:'{{ mongo_flag }}'})"